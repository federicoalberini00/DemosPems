{% extends 'layouts/base.html' %}
{% load static %}

{% block content %}
<div class="content-wrapper">
    <div class="content-header">
        <div class="container-fluid">
            <div class="row mb-2 align-items-center">
                <div class="col-sm-6">
                    <h1 class="m-0 text-bold text-primary">Analisi Energetica Pratolino</h1>
                </div>
                <div class="col-sm-6 text-right">
                    <div class="btn-group">
                        <a href="?period=D"
                            class="btn btn-sm btn-outline-primary {% if periodo_attivo == 'D' %}active{% endif %}">Giorni</a>
                        <a href="?period=ME"
                            class="btn btn-sm btn-outline-primary {% if periodo_attivo == 'ME' %}active{% endif %}">Mesi</a>
                        <a href="?period=YE"
                            class="btn btn-sm btn-outline-primary {% if periodo_attivo == 'YE' %}active{% endif %}">Anni</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="content">
        <div class="container-fluid">
            <div class="row">
                <div class="col-lg-7">
                    <div class="card card-primary card-outline">
                        <div class="card-header border-0">
                            <div class="d-flex justify-content-between align-items-center">
                                <h3 class="card-title text-bold">Consumo Rete vs Produzione Solare (Wh)</h3>

                                <form method="GET" class="form-inline">
                                    <input type="hidden" name="period" value="{{ periodo_attivo }}">

                                    <div class="input-group input-group-sm">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text">Area (m²)</span>
                                        </div>
                                        <input type="number" name="area_pannelli" class="form-control"
                                            value="{{ area_pannelli }}" step="1">
                                        <div class="input-group-append">
                                            <button type="submit" class="btn btn-primary">
                                                <i class="fas fa-sync-alt"></i>
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                        <div class="card-body">
                            <canvas id="energy-chart" height="300"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-lg-5">
                    <div class="card card-warning card-outline">
                        <div class="card-header border-0">
                            <h3 class="card-title text-bold">Utilizzo Mezzi (Ore)</h3>
                        </div>
                        <div class="card-body"><canvas id="hours-chart" height="300"></canvas></div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-12">
                    <div class="card card-success card-outline">
                        <div class="card-header border-0">
                            <h3 class="card-title text-bold"><i class="fas fa-gas-pump mr-2"></i>Litri Benzina per Asset
                            </h3>
                        </div>
                        <div class="card-body"><canvas id="gas-chart" height="250"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'plugins/chart.js/Chart.min.js' %}"></script>
<script>
    $(function () {
        // 1. Grafico Linee (Energia)
        new Chart($('#energy-chart'), {
            type: 'line',
            data: {
                labels: {{ labels_ele| safe }},
        datasets: [
        { label: 'Consumo (Wh)', data: {{ values_ele| safe }}, borderColor: '#007bff', backgroundColor: 'rgba(0,123,255,0.05)', fill: true },
        { label: 'Solare (Wh)', data: {{ values_fv| safe }}, borderColor: '#ffc107', backgroundColor: 'rgba(255,193,7,0.05)', fill: true }
    ]
      },
        options: { maintainAspectRatio: false }
    });

    // 2. Grafico Orizzontale (Ore)
    new Chart($('#hours-chart'), {
        type: 'horizontalBar',
        data: {
            labels: {{ labels_work| safe }},
        datasets: [{ label: 'Ore', data: {{ values_work| safe }}, backgroundColor: '#28a745' }]
      },
        options: { maintainAspectRatio: false, legend: { display: false } }
    });

    // 3. Grafico Barre (Benzina)
    new Chart($('#gas-chart'), {
        type: 'bar',
        data: {
            labels: {{ labels_gas| safe }},
        datasets: [{ label: 'Litri Totali', data: {{ values_gas| safe }}, backgroundColor: '#20c997' }]
      },
        options: { maintainAspectRatio: false }
    });
  })
</script>
{% endblock %}
