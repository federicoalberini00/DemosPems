<div class="card mb-3 shadow-sm">
    <div class="card-body d-flex justify-content-between align-items-center py-2">
        <div class="btn-group">
            <span class="btn btn-sm btn-light disabled">Intervallo:</span>
            <a href="?freq=D{% if current_asset %}&asset={{ current_asset }}{% endif %}"
                class="btn btn-sm btn-outline-primary {% if current_freq == 'D' %}active{% endif %}">Giorno</a>
            <a href="?freq=W{% if current_asset %}&asset={{ current_asset }}{% endif %}"
                class="btn btn-sm btn-outline-primary {% if current_freq == 'W' %}active{% endif %}">Settimana</a>
            <a href="?freq=ME{% if current_asset %}&asset={{ current_asset }}{% endif %}"
                class="btn btn-sm btn-outline-primary {% if current_freq == 'ME' %}active{% endif %}">Mese</a>
        </div>

        {% if segment == 'gas' or segment == 'working_hours' %}
        <form method="GET" class="form-inline">
            <input type="hidden" name="freq" value="{{ current_freq }}">
            <div class="input-group input-group-sm">
                <div class="input-group-prepend"><span class="input-group-text">Veicolo</span></div>
                <select name="asset" class="form-control" onchange="this.form.submit()">
                    <option value="">Tutti i veicoli</option>
                    {% for asset in asset_list %}
                    <option value="{{ asset }}" {% if current_asset == asset %}selected{% endif %}>{{ asset }}</option>
                    {% endfor %}
                </select>
            </div>
        </form>
        {% endif %}
    </div>
</div>
